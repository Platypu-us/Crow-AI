<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crow AI Chat</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      justify-content: center;
      background: radial-gradient(circle at top, #172554 0, #0b1220 42%);
    }

    .chat-shell {
      width: 100%;
      max-width: 920px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f172a;
      border-left: 1px solid #1e293b;
      border-right: 1px solid #1e293b;
    }

    .header {
      height: 64px;
      padding: 14px 18px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(15, 23, 42, 0.96);
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #22c55e;
      color: #052e16;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title strong {
      font-size: 16px;
    }

    .title span {
      font-size: 12px;
      color: #94a3b8;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 78%;
      padding: 11px 13px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .message.bot {
      align-self: flex-start;
      background: #1e293b;
      color: #f8fafc;
      border-bottom-left-radius: 5px;
    }

    .message.error {
      align-self: flex-start;
      background: #3f1d1d;
      color: #fecaca;
      border: 1px solid #7f1d1d;
    }

    .quote {
      margin-top: 8px;
      padding: 10px 12px;
      border-left: 4px solid #22c55e;
      background: #052e16;
      color: #dcfce7;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .typing {
      align-self: flex-start;
      background: #1e293b;
      color: #94a3b8;
      padding: 10px 13px;
      border-radius: 14px;
      border-bottom-left-radius: 5px;
      font-size: 14px;
    }

    .composer {
      padding: 12px;
      border-top: 1px solid #1e293b;
      background: rgba(15, 23, 42, 0.98);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      resize: none;
      border: 1px solid #334155;
      outline: none;
      border-radius: 10px;
      background: #020617;
      color: #f8fafc;
      padding: 12px;
      font-size: 15px;
      line-height: 1.35;
    }

    textarea:focus {
      border-color: #22c55e;
    }

    button {
      width: 48px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: 900;
      cursor: pointer;
      font-size: 18px;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (max-width: 600px) {
      .chat-shell {
        max-width: none;
        border: none;
      }

      .header {
        height: 58px;
        padding: 10px 12px;
      }

      .messages {
        padding: 12px;
      }

      .message {
        max-width: 88%;
        font-size: 14px;
      }

      .composer {
        padding: 8px;
      }

      textarea {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="chat-shell">
      <header class="header">
        <div class="avatar">C</div>
        <div class="title">
          <strong>Crow AI</strong>
          <span>deepseek-v4-flash через OpenModel</span>
        </div>
      </header>

      <main class="messages" id="messages">
        <div class="message bot">
          Привіт! Я Crow AI. Напиши питання або тему, і я допоможу.
        </div>
      </main>

      <form class="composer" id="chatForm">
        <textarea id="userInput" placeholder="Напиши повідомлення..." rows="1"></textarea>
        <button id="sendButton" type="submit">➤</button>
      </form>
    </div>
  </div>

  <script>
    const OPENMODEL_API_KEY = "om-2fLAUbzjVVqRZvkqmv8vWKEdma2THm5JnRMHMWbybi6";
    const OPENMODEL_BASE_URL = "https://api.openmodel.ai";
    const OPENMODEL_MODEL = "deepseek-v4-flash";
    const MAX_OUTPUT_TOKENS = 8200;

    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chatForm");
    const inputEl = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");

    const chatHistory = [];

    const SYSTEM_PROMPT = `
You are Crow AI, a smart and friendly AI assistant.

Always answer in the same language the user used in their latest message.
If the user writes in Ukrainian, answer in Ukrainian.
If the user writes in Russian, answer in Russian.
If the user writes in English, answer in English.

You are running on deepseek-v4-flash through the OpenModel API.
Do not say that you are GPT, ChatGPT, OpenAI, Claude, Gemini, or another model.

Formatting rules:
- Do not use markdown code fences like \`\`\`.
- Do not use markdown bold like **text**.
- If the user asks you to write a prompt, code, letter, message, text, essay, post, script, template, plan, or ready-to-copy content:
  Write a short intro normally.
  Put the ready content between [QUOTE] and [/QUOTE].

Be clear, useful and direct.
`;

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatAnswer(text) {
      text = text.replace(/```(?:\w+)?\s*([\s\S]*?)```/g, "[QUOTE]$1[/QUOTE]");

      const parts = [];
      const quoteRegex = /\[QUOTE\]([\s\S]*?)\[\/QUOTE\]/g;
      let lastIndex = 0;
      let match;

      while ((match = quoteRegex.exec(text)) !== null) {
        const before = text.slice(lastIndex, match.index).trim();
        const quote = match[1].trim();

        if (before) {
          parts.push(`<div>${escapeHtml(before)}</div>`);
        }

        if (quote) {
          parts.push(`<div class="quote">${escapeHtml(quote)}</div>`);
        }

        lastIndex = quoteRegex.lastIndex;
      }

      const after = text.slice(lastIndex).trim();

      if (after) {
        parts.push(`<div>${escapeHtml(after)}</div>`);
      }

      if (!parts.length) {
        return escapeHtml(text);
      }

      return parts.join("");
    }

    function addMessage(role, text, isHtml = false) {
      const div = document.createElement("div");
      div.className = `message ${role}`;

      if (isHtml) {
        div.innerHTML = text;
      } else {
        div.textContent = text;
      }

      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.textContent = "Crow AI пише...";
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function detectLanguage(text) {
      const lower = text.toLowerCase();

      if (/[іїєґ]/i.test(lower)) return "uk";
      if (/[ыэъё]/i.test(lower)) return "ru";

      const ukWords = ["якій", "якою", "мові", "працюєш", "відповідаєш", "ти", "що", "це", "мені"];
      const ruWords = ["какой", "какая", "языке", "работаешь", "отвечаешь", "ты", "что", "это", "мне"];
      const enWords = ["what", "which", "language", "model", "you", "work", "use", "are"];

      const ukScore = ukWords.filter(word => lower.includes(word)).length;
      const ruScore = ruWords.filter(word => lower.includes(word)).length;
      const enScore = enWords.filter(word => lower.includes(word)).length;

      if (ukScore >= ruScore && ukScore >= enScore && ukScore > 0) return "uk";
      if (ruScore >= ukScore && ruScore >= enScore && ruScore > 0) return "ru";
      if (enScore > 0) return "en";

      return "uk";
    }

    function isModelQuestion(text) {
      const lower = text.toLowerCase();
      const modelWords = ["модель", "моделі", "модели", "model", "gpt", "chatgpt"];
      const questionWords = ["якій", "якой", "яка", "какая", "працюєш", "работаешь", "ти", "ты", "you", "which", "what"];

      return modelWords.some(word => lower.includes(word)) &&
             questionWords.some(word => lower.includes(word));
    }

    function isLanguageQuestion(text) {
      const lower = text.toLowerCase();
      const languageWords = ["мова", "мові", "мовою", "язык", "языке", "language"];
      const questionWords = ["якій", "якою", "каком", "какой", "what", "which", "працюєш", "работаешь", "work", "ти", "ты", "you"];

      return languageWords.some(word => lower.includes(word)) &&
             questionWords.some(word => lower.includes(word));
    }

    function modelAnswer(language) {
      if (language === "ru") {
        return "Я Crow AI. Сейчас я работаю на модели deepseek-v4-flash через OpenModel API. Эта модель генерирует мои ответы.";
      }

      if (language === "en") {
        return "I am Crow AI. I am currently powered by deepseek-v4-flash through the OpenModel API. This model generates my answers.";
      }

      return "Я Crow AI. Зараз я працюю на моделі deepseek-v4-flash через OpenModel API. Ця модель генерує мої відповіді.";
    }

    function languageAnswer(language) {
      if (language === "ru") {
        return "Я могу работать на разных языках. Обычно я отвечаю на том языке, на котором ты мне пишешь.";
      }

      if (language === "en") {
        return "I can work in many languages. I usually reply in the same language you use.";
      }

      return "Я можу працювати різними мовами. Зазвичай я відповідаю тією мовою, якою ти мені пишеш.";
    }

    async function askCrowAI(userText) {
      const language = detectLanguage(userText);

      if (isModelQuestion(userText)) {
        return modelAnswer(language);
      }

      if (isLanguageQuestion(userText)) {
        return languageAnswer(language);
      }

      const messages = [...chatHistory, { role: "user", content: userText }];

      const response = await fetch(`${OPENMODEL_BASE_URL}/v1/messages`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${OPENMODEL_API_KEY}`,
          "x-api-key": OPENMODEL_API_KEY,
          "content-type": "application/json",
          "anthropic-version": "2023-06-01"
        },
        body: JSON.stringify({
          model: OPENMODEL_MODEL,
          system: SYSTEM_PROMPT,
          max_tokens: MAX_OUTPUT_TOKENS,
          temperature: 0.5,
          messages: messages
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(`${response.status}: ${JSON.stringify(data)}`);
      }

      let answer = "";

      for (const block of data.content || []) {
        if (block.type === "text") {
          answer += block.text;
        }
      }

      answer = answer.trim() || "AI повернув порожню відповідь.";

      chatHistory.push({ role: "user", content: userText });
      chatHistory.push({ role: "assistant", content: answer });

      return answer;
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();

      const userText = inputEl.value.trim();

      if (!userText) return;

      addMessage("user", userText);
      inputEl.value = "";
      inputEl.style.height = "44px";

      sendButton.disabled = true;
      const typingEl = addTyping();

      try {
        const answer = await askCrowAI(userText);
        typingEl.remove();
        addMessage("bot", formatAnswer(answer), true);
      } catch (error) {
        typingEl.remove();
        addMessage("error", "Помилка запиту до AI:\n\n" + error.message);
      } finally {
        sendButton.disabled = false;
        inputEl.focus();
      }
    });

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "44px";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        formEl.requestSubmit();
      }
    });
  </script>
</body>
</html>
